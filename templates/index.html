<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Jenkins 流水线测试页面</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { max-width: 400px; margin: 0 auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { padding: 8px; width: 60px; text-align: center; }
        button { padding: 8px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Jenkins 部署测试</h2>
        <p>请输入两个数字进行加法计算：</p>
        <input type="number" id="num1" value="1"> + 
        <input type="number" id="num2" value="2">
        <button onclick="calculate()">计算</button>
        <div id="result">等待计算...</div>
    </div>

    <script>
        async function calculate() {
            const n1 = document.getElementById('num1').value;
            const n2 = document.getElementById('num2').value;
            const response = await fetch(`/api/add/${n1}/${n2}`);
            const data = await response.json();
            document.getElementById('result').innerText = `计算结果：${data.result}`;
        }
    </script>
</body>
</html>
